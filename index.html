<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Tic Tac Toe</title>
		<link rel="stylesheet" href="./styles.css">
		<script src="./script.js" defer></script>
	</head>
	<body>
		<p id="current-player-hint"></p>
		<main></main>
		<section class="scoreboard">
			<p>Player 1 (X)</p>
			<p>Player 2 (O)</p>
			<p data-highlight="false" id="player1-score">0</p>
			<p data-highlight="false" id="player2-score">0</p>
		</section>
		<button disabled id="new-round">New Round</button>
		<form>
			<label for="grid-width">Grid Width: </label>
			<input id="grid-width" type="number" min="1" max="16" value="3">
		</form>
	</body>
</html>
